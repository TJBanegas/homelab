---
- name: Check if netdata is already installed
  ansible.builtin.stat:
    path: /usr/sbin/netdata
  register: netdata_binary

- name: Download netdata kickstart script
  ansible.builtin.get_url:
    url: https://get.netdata.cloud/kickstart.sh
    dest: /tmp/netdata-kickstart.sh
    mode: '0755'
  when: not netdata_binary.stat.exists

- name: Install netdata
  ansible.builtin.command:
    cmd: bash /tmp/netdata-kickstart.sh --stable-channel --disable-telemetry --non-interactive --install-type static
  when: not netdata_binary.stat.exists
  changed_when: true

- name: Detect netdata config directory
  ansible.builtin.shell: |
    if [ -d /etc/netdata ]; then
      echo /etc/netdata
    elif [ -d /opt/netdata/etc/netdata ]; then
      echo /opt/netdata/etc/netdata
    fi
  register: netdata_config_dir_result
  changed_when: false

- name: Set netdata config directory fact
  ansible.builtin.set_fact:
    netdata_config_dir: "{{ netdata_config_dir_result.stdout | trim }}"

- name: Ensure netdata service is enabled and running
  ansible.builtin.systemd:
    name: netdata
    state: started
    enabled: true
