---
- name: Template parent stream.conf
  ansible.builtin.template:
    src: stream-parent.conf.j2
    dest: /etc/netdata/stream.conf
    owner: netdata
    group: netdata
    mode: '0640'
  notify: restart netdata

- name: Template parent netdata.conf
  ansible.builtin.template:
    src: netdata-parent.conf.j2
    dest: /etc/netdata/netdata.conf
    owner: netdata
    group: netdata
    mode: '0644'
  notify: restart netdata
